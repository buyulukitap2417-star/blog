<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATOTA | Blog - Matematik & Mantık</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Görüntüleme Sorununu Çözen Markdown Kütüphanesi -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        body { font-family: 'Space Grotesk', sans-serif; background: #f8fafc; color: #0f172a; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(16, 185, 129, 0.1); }
        .gradient-text { background: linear-gradient(135deg, #059669, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .math-pattern { background-image: radial-gradient(#10b981 0.5px, transparent 0.5px); background-size: 24px 24px; }
        .btn-modern { background: #10b981; color: white; transition: all 0.3s; box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.39); }
        .btn-modern:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16, 185, 129, 0.45); }
        
        /* Markdown İçerik Stilleri */
        #post-render-area h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 1.5rem; }
        #post-render-area h2 { font-size: 2rem; font-weight: 700; margin-top: 2rem; margin-bottom: 1rem; color: #059669; }
        #post-render-area p { margin-bottom: 1.25rem; line-height: 1.8; }
        #post-render-area ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1.5rem; }
        #post-render-area li { margin-bottom: 0.5rem; }
        #post-render-area strong { color: #064e3b; font-weight: 700; }
    </style>
</head>
<body class="math-pattern">

    <!-- Navbar -->
    <nav class="sticky top-0 z-[100] glass border-b">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="showPage('home')">
                <span class="text-2xl font-black tracking-tighter uppercase">MATOTA<span class="text-emerald-500 font-light">|</span>BLOG</span>
            </div>
            <div class="hidden md:flex items-center gap-8 font-semibold">
                <button onclick="showPage('home')" class="hover:text-emerald-600 transition">Anasayfa</button>
                <button onclick="showPage('blogs')" class="hover:text-emerald-600 transition">Yazılar</button>
                <button onclick="showPage('files')" class="hover:text-emerald-600 transition">Dosyalar</button>
            </div>
            <div id="auth-ui" class="flex items-center gap-3"></div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="page-home" class="space-y-12">
             <section class="flex flex-col md:flex-row items-center gap-12 py-12">
                <div class="flex-1 space-y-8">
                    <h1 class="text-6xl md:text-8xl font-black text-slate-900 leading-tight">Zihnini <br> <span class="gradient-text">Matematikle</span> <br> Eğit.</h1>
                    <p class="text-xl text-slate-600">Her gün yeni bir mantık sorusu, her hafta yeni bir konu özeti.</p>
                    <button onclick="showPage('blogs')" class="btn-modern px-8 py-4 rounded-2xl font-bold text-lg">Keşfetmeye Başla</button>
                </div>
            </section>
            <div id="latest-posts" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
        </div>

        <div id="page-blogs" class="hidden">
            <h2 class="text-4xl font-black mb-12 text-center">Tüm Paylaşımlar</h2>
            <div id="posts-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
        </div>

        <div id="page-files" class="hidden">
             <h2 class="text-4xl font-black mb-12 text-center">Dosya Arşivi</h2>
             <div id="files-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </div>

        <div id="page-post-detail" class="hidden max-w-4xl mx-auto">
            <button onclick="showPage('blogs')" class="mb-8 font-bold text-emerald-600 flex items-center gap-2"><i class="fa-solid fa-arrow-left"></i> Yazılara Dön</button>
            <article class="bg-white p-8 md:p-16 rounded-[3rem] border shadow-sm">
                <!-- Render Area -->
                <div id="post-render-area" class="text-lg text-slate-700 leading-relaxed"></div>
                
                <div class="flex gap-4 pt-12 mt-12 border-t" id="post-actions"></div>
            </article>

            <div class="mt-12 glass p-8 rounded-[2.5rem] border shadow-sm">
                <h3 class="text-2xl font-bold mb-6">Yorumlar</h3>
                <div id="comments-list" class="space-y-4 mb-8"></div>
                <div id="comment-form">
                    <textarea id="comment-text" placeholder="Bu yazı hakkında ne düşünüyorsun?" class="w-full p-4 rounded-2xl border outline-none focus:ring-2 focus:ring-emerald-500 resize-none"></textarea>
                    <button onclick="sendComment()" class="mt-4 btn-modern px-6 py-3 rounded-xl font-bold">Yorumunu Paylaş</button>
                </div>
            </div>
        </div>

        <!-- Auth Pages (Login/Register) -->
        <div id="page-login" class="hidden max-w-md mx-auto py-12">
            <div class="glass p-10 rounded-[2.5rem] shadow-xl space-y-8">
                <div id="login-box">
                    <h2 class="text-3xl font-black mb-6">Giriş Yap</h2>
                    <form id="login-form" class="space-y-4">
                        <input type="email" id="l-email" placeholder="E-posta" required class="w-full p-4 rounded-xl border">
                        <input type="password" id="l-password" placeholder="Şifre" required class="w-full p-4 rounded-xl border">
                        <button type="submit" class="w-full btn-modern p-4 rounded-xl font-bold">Devam Et</button>
                    </form>
                    <p class="mt-4 text-center text-sm">Hesabın yok mu? <button onclick="toggleAuth()" class="text-emerald-600 font-bold">Kayıt Ol</button></p>
                </div>
                <div id="reg-box" class="hidden">
                    <h2 class="text-3xl font-black mb-6">Aramıza Katıl</h2>
                    <form id="reg-form" class="space-y-4">
                        <input type="text" id="r-name" placeholder="Ad Soyad" required class="w-full p-4 rounded-xl border">
                        <input type="email" id="r-email" placeholder="E-posta" required class="w-full p-4 rounded-xl border">
                        <input type="password" id="r-password" placeholder="Şifre" required class="w-full p-4 rounded-xl border">
                        <button type="submit" class="w-full btn-modern p-4 rounded-xl font-bold">Kayıt Ol</button>
                    </form>
                    <p class="mt-4 text-center text-sm">Zaten üye misin? <button onclick="toggleAuth()" class="text-emerald-600 font-bold">Giriş Yap</button></p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://eygvzptaynyysagvgwyh.supabase.co'; 
        const SB_KEY = 'sb_publishable_JixS3C4jQ2Znrgcr3-IZPg_1MfpvdXW';
        const sc = window.supabase.createClient(SB_URL, SB_KEY);

        let user = null;
        let currentPostId = null;

        async function init() {
            const { data: { session } } = await sc.auth.getSession();
            user = session?.user || null;
            updateAuthUI();
            fetchContent();
        }

        function updateAuthUI() {
            const ui = document.getElementById('auth-ui');
            if(user) {
                ui.innerHTML = `<span class="text-sm font-bold text-emerald-700">${user.user_metadata.full_name}</span>
                               <button onclick="logout()" class="text-red-500 text-xs font-bold px-2 py-1 bg-red-50 rounded-lg">Çıkış</button>`;
            } else {
                ui.innerHTML = `<button onclick="showPage('login')" class="px-6 py-2 rounded-full font-bold border border-emerald-500 text-emerald-600">Giriş</button>`;
            }
        }

        async function logout() { await sc.auth.signOut(); location.reload(); }

        function showPage(p) {
            ['home','blogs','files','login','post-detail'].forEach(id => document.getElementById('page-'+id).classList.add('hidden'));
            document.getElementById('page-'+p).classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function toggleAuth() {
            document.getElementById('login-box').classList.toggle('hidden');
            document.getElementById('reg-box').classList.toggle('hidden');
        }

        async function fetchContent() {
            const { data: posts } = await sc.from('posts').select('*').order('created_at', { ascending: false });
            const { data: files } = await sc.from('files').select('*').order('created_at', { ascending: false });
            renderPosts(posts || []);
            renderFiles(files || []);
        }

        function renderPosts(posts) {
            const html = posts.map(p => `
                <div class="glass p-8 rounded-[2.5rem] hover:-translate-y-2 transition cursor-pointer flex flex-col h-full shadow-sm" onclick="viewPost('${p.id}')">
                    <h3 class="text-2xl font-bold mb-4 leading-tight">${p.title}</h3>
                    <p class="text-slate-500 text-sm line-clamp-3 mb-8 flex-grow">${p.content.replace(/[#*]/g, '')}</p>
                    <div class="flex items-center justify-between text-xs font-bold text-emerald-600 bg-emerald-50 p-3 rounded-2xl">
                        <span>${new Date(p.created_at).toLocaleDateString('tr-TR')}</span>
                        <div class="flex gap-3">
                            <span><i class="fa-solid fa-heart mr-1"></i> ${p.likes_count || 0}</span>
                            <span><i class="fa-solid fa-comment mr-1"></i> ${p.comments_count || 0}</span>
                        </div>
                    </div>
                </div>
            `).join('');
            document.getElementById('posts-grid').innerHTML = html;
            document.getElementById('latest-posts').innerHTML = html.slice(0,3);
        }

        function renderFiles(files) {
            document.getElementById('files-list').innerHTML = files.map(f => `
                <div class="glass p-6 rounded-2xl flex items-center justify-between border">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-emerald-100 rounded-xl flex items-center justify-center text-emerald-600 text-xl"><i class="fa-solid fa-file-invoice"></i></div>
                        <div><h4 class="font-bold">${f.name}</h4><span class="text-xs text-slate-400 uppercase font-black">${f.file_type} Belgesi</span></div>
                    </div>
                    <a href="${f.url}" target="_blank" class="w-10 h-10 rounded-full bg-slate-900 text-white flex items-center justify-center hover:bg-emerald-600 transition shadow-lg shadow-slate-200"><i class="fa-solid fa-download"></i></a>
                </div>
            `).join('');
        }

        async function viewPost(id) {
            currentPostId = id;
            const { data: post } = await sc.from('posts').select('*').eq('id', id).single();
            const { data: liked } = user ? await sc.from('likes').select('*').eq('post_id', id).eq('user_id', user.id).single() : { data: null };

            showPage('post-detail');
            
            // MARKED ile HTML'e dönüştür ve Başlığı ekle
            document.getElementById('post-render-area').innerHTML = `
                <h1 class="gradient-text">${post.title}</h1>
                ${marked.parse(post.content)}
            `;

            document.getElementById('post-actions').innerHTML = `
                <button onclick="toggleLike('${id}')" class="flex items-center gap-2 px-8 py-3 rounded-2xl font-black ${liked ? 'bg-red-500 text-white shadow-red-200' : 'bg-slate-100 text-slate-900'} transition shadow-lg">
                    <i class="fa-solid fa-heart"></i> ${post.likes_count || 0} Beğeni
                </button>
            `;
            fetchComments(id);
        }

        async function fetchComments(id) {
            const { data } = await sc.from('comments').select('*').eq('post_id', id).order('created_at', { ascending: true });
            document.getElementById('comments-list').innerHTML = data?.length ? data.map(c => `
                <div class="p-5 bg-slate-50 rounded-3xl border border-slate-100">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-black text-sm text-emerald-700 uppercase tracking-tighter">${c.user_name}</span>
                        <span class="text-[10px] text-slate-400 font-bold">${new Date(c.created_at).toLocaleDateString('tr-TR')}</span>
                    </div>
                    <p class="text-slate-600 text-sm leading-relaxed">${c.text}</p>
                </div>
            `).join('') : '<p class="text-slate-400 italic text-center py-4">Henüz kimse yorum yapmamış. İlk yorumu sen yap!</p>';
        }

        async function sendComment() {
            if(!user) return alert("Yorum yapmak için giriş yapmalısın!");
            const text = document.getElementById('comment-text').value.trim();
            if(!text) return;
            const { error } = await sc.from('comments').insert([{ post_id: currentPostId, user_id: user.id, user_name: user.user_metadata.full_name, text }]);
            if(!error) { document.getElementById('comment-text').value = ''; fetchComments(currentPostId); }
        }

        async function toggleLike(id) {
            if(!user) return alert("Beğenmek için giriş yapmalısın!");
            const { data: existing } = await sc.from('likes').select('*').eq('post_id', id).eq('user_id', user.id).single();
            if(existing) {
                await sc.from('likes').delete().eq('id', existing.id);
            } else {
                await sc.from('likes').insert([{ post_id: id, user_id: user.id }]);
            }
            viewPost(id);
        }

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const { data, error } = await sc.auth.signInWithPassword({ email: document.getElementById('l-email').value, password: document.getElementById('l-password').value });
            if(error) alert("Hata: " + error.message); else location.reload();
        }

        document.getElementById('reg-form').onsubmit = async (e) => {
            e.preventDefault();
            const { data, error } = await sc.auth.signUp({ email: document.getElementById('r-email').value, password: document.getElementById('r-password').value, options: { data: { full_name: document.getElementById('r-name').value } } });
            if(error) alert("Hata: " + error.message); else alert("Kayıt başarılı! Giriş yapabilirsin.");
        }

        init();
    </script>
</body>
</html>
